# Production Database (PostgreSQL) - environment vars injected by Render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 in Production
spring.h2.console.enabled=false

# Injected variables on Render
jwt.secret=${JWT_SECRET}
file.upload-dir=${UPLOAD_DIR:/var/data/uploads}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://portfolio-frontend.onrender.com}
