spring.application.name=portfolio
server.port=${PORT:9002}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:mySuperSecretKey_ChangeThisToAVeryLongSecureKey_123456789}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name_here}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key_here}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret_here}