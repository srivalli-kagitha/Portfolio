spring.application.name=portfolio
server.port=${PORT:9002}

# PostgreSQL (FIXED FORMAT)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (STRONG KEY - MUST BE 32+ chars)
jwt.secret=${JWT_SECRET:mySuperSecretKey_ChangeThisToAVeryLongSecureKey_123456789}

# Cloudinary (PLACEHOLDERS - SAFE)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name_here}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key_here}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret_here}