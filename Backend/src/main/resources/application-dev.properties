# Persistent file-based H2 Database for local development
spring.datasource.url=jdbc:h2:file:./data/portfoliodb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Secret keys and upload folder
jwt.secret=sriPortfolioSecureSecretKeyForJWTAuthentication2026LocalOnlyDev
file.upload-dir=uploads
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000
